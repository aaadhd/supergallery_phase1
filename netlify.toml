[build]
  # Netlify는 저장소에 pnpm-lock.yaml이 있으면 설치 단계에서 pnpm을 쓴다(빌드 명령과 무관).
  # pnpm-lock + package-lock 혼재 시 설치가 자주 실패하므로 package-lock.json만 둔다.
  # 설치는 Netlify 기본(npm install), 여기서는 Vite 빌드만 실행한다.
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA: 모든 경로를 index.html로 (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 기본 보안 헤더 (전 경로)
# CSP는 데모 단계라 외부 이미지(Unsplash 등) 허용. 프로덕션 전환 시 도메인 단일화 후 타이트닝 권장.
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
